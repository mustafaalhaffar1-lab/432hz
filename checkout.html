<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout — 432Hz</title>
<meta name="theme-color" content="#1C2620">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="assets/css/styles.css">
<style>
  body { background: var(--bone); }
  .co { padding: clamp(7rem,12vh,9rem) var(--pad-x) clamp(4rem,8vw,6rem); }
  .co-grid { display:grid; grid-template-columns: 1.2fr .9fr; gap: clamp(2rem,5vw,4rem); align-items:start; }
  .co h1 { font-size: var(--fs-h2); margin-bottom: .4rem; }
  .co .sub { color: var(--muted); margin-bottom: 2.2rem; }
  .field { margin-bottom: 1.1rem; }
  .field label { display:block; font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; color: var(--muted); margin-bottom:.4rem; }
  .field input, .field select, .field textarea { width:100%; font:inherit; font-size:1rem; padding:.9rem 1rem; border:1px solid var(--line); border-radius:10px; background: var(--bone); color: var(--ink); transition:.3s; }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(199,164,90,.15); }
  .field-row { display:grid; grid-template-columns: 1fr 1fr; gap:1rem; }
  .summary-box { background: var(--bone-deep); border-radius: var(--radius-lg); padding: 1.8rem; position: sticky; top: 6rem; }
  .summary-box h3 { font-size:1.4rem; margin-bottom:1.4rem; }
  .co-line { display:grid; grid-template-columns: 48px 1fr auto; gap:.9rem; align-items:center; padding-bottom:1rem; margin-bottom:1rem; border-bottom:1px solid var(--line); }
  .co-line .thumb { width:48px; height:56px; border-radius:8px; background: var(--sand); overflow:hidden; }
  .co-line .thumb img { width:100%; height:100%; object-fit:cover; }
  .co-line b { font-family: var(--display); font-weight:400; font-size:1.02rem; }
  .co-line small { color: var(--muted); }
  .co-totals div { display:flex; justify-content:space-between; padding:.35rem 0; color: var(--muted); }
  .co-totals .grand { font-family: var(--display); font-size:1.4rem; color: var(--ink); padding-top:.8rem; margin-top:.4rem; border-top:1px solid var(--line); }
  .co-submit { width:100%; justify-content:center; margin-top:1.4rem; }
  .co-trust { font-size:.78rem; color: var(--muted); text-align:center; margin-top:1rem; }
  .confirm { text-align:center; max-width:560px; margin:0 auto; }
  .confirm .ring { width:110px; height:110px; margin:0 auto 1.6rem; display:grid; place-items:center; border-radius:50%; background: radial-gradient(circle, rgba(199,164,90,.18), transparent 70%); color: var(--gold); }
  .confirm h1 { font-size: var(--fs-h1); margin-bottom:1rem; }
  .confirm p { color: var(--muted); font-size:var(--fs-lead); margin-bottom:.6rem; }
  .confirm .num { font-family: var(--display); font-size:1.6rem; color: var(--clay); margin:1rem 0 2rem; }
  .empty-co { text-align:center; padding:4rem 0; }
  @media (max-width:820px){ .co-grid{ grid-template-columns:1fr; } .summary-box{ position:static; } }
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<header class="site-header scrolled" id="header">
  <a href="index.html" class="brand"><svg class="brand-mark" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.2"/><circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="1" opacity=".55"/><circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width=".8" opacity=".3"/></svg>432<span class="hz">Hz</span></a>
  <nav class="nav">
    <a href="collection.html">Shop All</a><a href="gift.html">Gift Finder</a><a href="journal.html">Journal</a><a href="about.html">Our Story</a>
  </nav>
  <div class="header-actions">
    <a href="collection.html" class="link-underline" style="font-size:.78rem">← Continue shopping</a>
  </div>
</header>

<main class="co">
  <div class="wrap" id="coRoot">
    <!-- rendered by JS -->
  </div>
</main>

<footer class="site-footer">
  <div class="wrap-wide">
    <div class="footer-bottom" style="border-top:1px solid rgba(255,255,255,.1)"><span>© <span id="year">2026</span> 432 HZ FZE · info@432hz.ae</span><span style="font-size:.78rem">Secure checkout · Demo store</span></div>
  </div>
</footer>

<script>
  (() => {
    const $ = (s, c=document) => c.querySelector(s);
    const money = (n) => 'Dhs. ' + Math.round(n);
    const parsePrice = (s) => parseFloat(String(s).replace(/dhs\.?/i,'').replace(/[^\d.]/g,'')) || 0;
    const root = $('#coRoot');
    let cart = [];
    try { cart = JSON.parse(localStorage.getItem('hz_cart')) || []; } catch {}
    document.getElementById('year').textContent = new Date().getFullYear();

    const renderEmpty = () => { root.innerHTML = `<div class="empty-co"><h1>Your basket is empty</h1><p class="sub">Begin with an intention.</p><a class="btn" href="collection.html"><span>Shop the rituals</span> <span class="arrow">→</span></a></div>`; };

    const totals = () => {
      const subtotal = cart.reduce((s,i)=> s + parsePrice(i.price)*i.qty, 0);
      const shipping = subtotal >= 100 ? 0 : 25;
      return { subtotal, shipping, total: subtotal+shipping };
    };

    const render = () => {
      if (!cart.length) return renderEmpty();
      const t = totals();
      root.innerHTML = `
        <div class="co-grid">
          <div>
            <h1>Checkout</h1>
            <p class="sub">Just a few details and your ritual is on its way.</p>
            <form id="coForm">
              <div class="field"><label>Full name</label><input name="name" required placeholder="Aisha Khalid"></div>
              <div class="field-row">
                <div class="field"><label>Email</label><input type="email" name="email" required placeholder="you@email.com"></div>
                <div class="field"><label>Phone</label><input name="phone" required placeholder="+971 ..."></div>
              </div>
              <div class="field"><label>Address</label><input name="address" required placeholder="Street, building, apartment"></div>
              <div class="field-row">
                <div class="field"><label>City</label><input name="city" required placeholder="Dubai"></div>
                <div class="field"><label>Country</label><select name="country">
                  <option>United Arab Emirates</option><option>Saudi Arabia</option><option>Qatar</option><option>Bahrain</option><option>Kuwait</option><option>Oman</option>
                </select></div>
              </div>
              <div class="field"><label>Order note (optional)</label><textarea name="note" rows="2" placeholder="Anything we should know?"></textarea></div>
              <button class="btn co-submit" type="submit" id="placeBtn"><span>Place order — ${money(t.total)}</span></button>
              <p class="co-trust">This is a demo store — no payment is taken. Your order is recorded in the admin portal.</p>
            </form>
          </div>
          <aside class="summary-box">
            <h3>Order summary</h3>
            ${cart.map((i)=>`<div class="co-line"><div class="thumb">${i.image?`<img src="${i.image}" alt="">`:''}</div><div><b>${i.name}</b><br><small>Qty ${i.qty}</small></div><div style="font-family:var(--display)">${money(parsePrice(i.price)*i.qty)}</div></div>`).join('')}
            <div class="co-totals">
              <div><span>Subtotal</span><span>${money(t.subtotal)}</span></div>
              <div><span>Shipping</span><span>${t.shipping===0?'Free':money(t.shipping)}</span></div>
              <div class="grand"><span>Total</span><span>${money(t.total)}</span></div>
            </div>
          </aside>
        </div>`;

      $('#coForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = $('#placeBtn'); btn.disabled = true; btn.querySelector('span').textContent = 'Placing order…';
        const fd = new FormData(e.target);
        const customer = Object.fromEntries(fd.entries());
        try {
          const r = await fetch('/api/orders', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ customer, items: cart.map((i)=>({name:i.name, price: parsePrice(i.price), qty:i.qty})) }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || 'Order failed');
          localStorage.removeItem('hz_cart');
          confirm(data.number);
        } catch (err) {
          btn.disabled = false; btn.querySelector('span').textContent = 'Try again';
          alert('Something went wrong placing your order: ' + err.message);
        }
      });
    };

    const confirm = (number) => {
      root.innerHTML = `
        <div class="confirm">
          <div class="ring"><svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10" opacity=".3"/><path d="m7 12 3.5 3.5L17 9"/></svg></div>
          <h1>Thank you.</h1>
          <p>Your ritual is on its way. A confirmation has been recorded.</p>
          <div class="num">Order ${number}</div>
          <a class="btn" href="collection.html"><span>Continue shopping</span> <span class="arrow">→</span></a>
        </div>`;
    };

    render();
  })();
</script>
</body>
</html>
